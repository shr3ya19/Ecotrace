<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>EcoTrace - Pollution Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
display:flex;
background:#f4f7fb;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#0f9d6c;
color:white;
height:100vh;
padding:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo-img{
width:35px;
height:35px;
}

.logo h2{
margin:0;
}

.logo p{
margin:0;
font-size:12px;
opacity:0.8;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:12px;
color:white;
text-decoration:none;
border-radius:10px;
margin-bottom:10px;
font-weight:500;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

.sidebar a.active{
background:white;
color:#0f9d6c;
}

/* ICON */

.icon{
width:20px;
height:20px;
object-fit:contain;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* LEGEND */

.legend{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.dot{
height:12px;
width:12px;
display:inline-block;
border-radius:50%;
margin-right:5px;
}

.low{background:green;}
.medium{background:orange;}
.high{background:red;}

/* MAP */

#map{
height:500px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="logo5.png" class="logo-img">

<div>
<h2>EcoTrace</h2>
<p>Environmental Monitor</p>
</div>

</div>

<a href="dashboard.html">
<img src="data-analysis.png" class="icon">
Dashboard
</a>

<a href="upload.html">
<img src="upload.png" class="icon">
Upload Data
</a>

<a href="map.html" class="active">
<img src="map.png" class="icon">
Pollution Map
</a>

<a href="insight.html">
<img src="insight.png" class="icon">
Insights
</a>

</div>

<!-- MAIN -->

<div class="main">

<h1>Pollution Map</h1>
<p>Geographic visualization of industrial facilities</p>

<div class="legend">
<b>Risk Level Legend</b><br><br>
<span class="dot low"></span> Low Risk &nbsp;&nbsp;
<span class="dot medium"></span> Medium Risk &nbsp;&nbsp;
<span class="dot high"></span> High Risk
</div>

<div id="map"></div>

</div>

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Create map
var map = L.map('map').setView([20.5937, 78.9629], 5);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// Low Risk
L.circleMarker([19.0760,72.8777],{
radius:8,
color:"green",
fillColor:"green",
fillOpacity:0.8
}).addTo(map).bindPopup("Low Risk Factory - Mumbai");

// Medium Risk
L.circleMarker([18.5204,73.8567],{
radius:8,
color:"orange",
fillColor:"orange",
fillOpacity:0.8
}).addTo(map).bindPopup("Medium Risk Factory - Pune");

// High Risk
L.circleMarker([17.3850,78.4867],{
radius:8,
color:"red",
fillColor:"red",
fillOpacity:0.8
}).addTo(map).bindPopup("High Risk Factory - Hyderabad");

</script>

</body>
</html>
