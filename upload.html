<!DOCTYPE html>
<html>

<head>

<title>EcoTrace Upload</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
display:flex;
background:#f4f6fb;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#0f9d6c;
color:white;
height:100vh;
padding:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo-img{
width:35px;
height:35px;
}

.logo h2{
margin:0;
}

.logo p{
margin:0;
font-size:12px;
opacity:0.8;
}

/* SIDEBAR LINKS */

.sidebar a{
display:flex;
align-items:center;
gap:10px;
color:white;
padding:12px;
margin-top:10px;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

.sidebar a.active{
background:white;
color:#0f9d6c;
}

/* ICON */

.icon{
width:20px;
height:20px;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* UPLOAD BOX */

.upload-box{
background:white;
border-radius:12px;
padding:40px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.upload-area{
border:2px dashed #cbd5e1;
border-radius:12px;
padding:60px;
text-align:center;
}

.upload-btn{
background:#0f9d6c;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

.upload-btn:hover{
background:#0b7a54;
}

.file-name{
margin-top:15px;
color:#444;
font-weight:500;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="logo5.png" class="logo-img">

<div>
<h2>EcoTrace</h2>
<p>Environmental Monitor</p>
</div>

</div>

<a href="dashboard.html">
<img src="data-analysis.png" class="icon">
Dashboard
</a>

<a href="upload.html" class="active">
<img src="upload.png" class="icon">
Upload Data
</a>

<a href="map.html">
<img src="map.png" class="icon">
Pollution Map
</a>

<a href="insights.html">
<img src="insight.png" class="icon">
Insights
</a>

</div>

<!-- MAIN -->

<div class="main">

<h1>Upload Data</h1>
<p>Import factory pollution data for analysis</p>

<div class="upload-box">

<h3>CSV File Upload</h3>

<div class="upload-area">

<p>Drag and drop your CSV file here</p>

<p>or</p>

<input type="file" id="fileInput" accept=".csv" hidden>

<button class="upload-btn" onclick="document.getElementById('fileInput').click()">
Browse Files
</button>

<p class="file-name" id="fileName"></p>

<p style="margin-top:10px;color:gray;">
Supported format: CSV files only
</p>

</div>

</div>

</div>

<script>

/* Show selected file name */

document.getElementById("fileInput").addEventListener("change", function(){

let file=this.files[0]

if(file){
document.getElementById("fileName").innerText="Selected: "+file.name
}

})

</script>

</body>

</html>
